<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Persona Inspired Menu</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="background"></div>

<div class="shape shape-1"></div>
<div class="shape shape-2"></div>

<div class="character">

    <img
        src="backdrop.png"
        class="character-backdrop"
        alt=""
    >

    <img
        src="foreground.png"
        class="character-foreground"
        alt=""
    >

</div>

<div id="wipe"></div>

<div class="ui">

    <div class="left-panel">

        <div class="menu-title" id="menuTitle">
            MAIN MENU
        </div>

        <div class="menu" id="menu"></div>

    </div>

    <div class="right-panel">

        <div id="content" class="content">
            Welcome.
        </div>

    </div>

</div>

<div class="controls">
    ↑ ↓ Navigate | Enter Select | Esc Back | Mouse Supported
</div>

<script src="script.js"></script>

</body>
</html>
